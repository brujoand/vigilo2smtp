---
name: Build and push Docker image

on:
  push:
    branches:
      - main
    paths:
      - poller.py
      - web.py
      - main.py
      - Dockerfile
      - VERSION

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/brujoand/vigilo2smtp:${{ steps.version.outputs.version }}
            ghcr.io/brujoand/vigilo2smtp:latest
